  	<h1 class="post-title">Git中修改文件名大小写导致文件丢失</h1>
  


        <div class="post-meta">
          <span class="post-date">
  <time datetime="2019-09-08T16:00:00.000Z">2019-09-09</time>
</span>

          
  <span class="post-category">
    <a class="category-link" href="/Evandoz/categories/%E5%B7%A5%E5%85%B7%E5%BA%94%E7%94%A8/">工具应用</a>
  </span>


        </div>
        <div id="post-content" class="post-content">
          <p><a href="https://juejin.im/pin/5d31717e6fb9a07d872415b1" target="_blank" rel="external nofollow noopener noreferrer">解决&quot;修改文件名大小写&quot;造成的git上传文件丢失</a></p>
<p>法一</p>
<ol>
<li>让 git 区分大小写：</li>
</ol>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">git config core.ignorecase <span class="literal">false</span></span><br></pre></td></tr></table></figure>
<ol start="2">
<li>删除缓存：</li>
</ol>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">git rm -r --cached</span><br></pre></td></tr></table></figure>
<ol start="3">
<li>剩余照常</li>
</ol>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">git add .</span><br><span class="line">git commit -m <span class="string">'xxx'</span></span><br><span class="line">git push xxx</span><br></pre></td></tr></table></figure>
<p>法二</p>
<p>修改文件大小写，然后重新提交</p>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">a.txt A.txt</span><br></pre></td></tr></table></figure>
